{% extends 'base.html' %}


{% block content %}

<div class="col-12 p-4">
    <div class="card rounded-3 shadow-sm overflow-hidden"></div>
    <h5 class="card-header bg-ligth py-3 text-center">
        <i class=" fas fa-laptop me-2"></i> Listado de Ubicacion
    </h5>
    <hr>
    <br>
    <div class="table-responsive">
        <table class="table table-striped table-hover mb-0">
            <thead class="table-dark">
                <tr>
                    <th>Ubicaicon</th>
                    <th>Opciones</th>
                </tr>
            </thead>
            <tbody>
                {% for Ubicacion in entity %}
                <tr>
                    <td>{{ Ubicacion.ubicacion }}</td>
                    <td>
                        <a href="{% url 'modificarb' Ubicacion.id %}" class="btn btn-primary">Modificar</a>
                        <button class="btn btn-danger"
                            onclick="confirmarEliminacion('ubicacion', '{% url 'eliminarb' Ubicacion.id %}')">
                            Eliminar
                        </button>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="10" class="text-center">No hay ubicaciones registradas</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <div>
            {% include 'app/pagination.html' %}
        </div>
    </div>
</div>
{% endblock %}
